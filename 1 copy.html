<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save The Date - Nikkah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400&display=swap');

        body {
            background-color: #fcfaf5;
            font-family: 'Poppins', sans-serif;
            color: #2d4537;
            overflow-x: hidden;
        }

        .font-playfair {
            font-family: 'Playfair Display', serif;
        }

        .font-cinzel {
            font-family: 'Cinzel', serif;
        }

        .fade-in {
            animation: fadeIn 2s ease-in-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .lantern-sway {
            animation: sway 4s ease-in-out infinite alternate;
            transform-origin: top center;
        }

        @keyframes sway {
            from {
                transform: rotate(-5deg);
            }

            to {
                transform: rotate(5deg);
            }
        }

        .floating {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

    <div
        class="relative w-full max-w-2xl bg-white p-8 md:p-12 border-2 border-[#d4af37] shadow-2xl rounded-lg text-center overflow-hidden">

        <!-- Animated Elements -->
        <div class="absolute top-0 right-0 p-6 lantern-sway">
            <svg width="60" height="120" viewBox="0 0 24 48" fill="#d4af37" class="opacity-80">
                <path d="M12 2L4 10v20l8 8 8-8V10L12 2zm0 4l6 6v18l-6 6-6-6V12l6-6z" />
            </svg>
        </div>

        <div class="fade-in">
            <h2 class="text-3xl font-cinzel text-[#2d4537] mb-4">إن شاء الله</h2>
            <p class="text-sm uppercase tracking-widest text-[#8b7355] mb-8">With the blessings of Allah</p>

            <h1 class="text-4xl md:text-5xl font-playfair italic text-[#2d4537] mb-2">Muhammed Afeef Ms</h1>
            <p class="text-sm text-gray-500 mb-6 uppercase">S/O Saidalavi & Raseena</p>

            <div class="text-2xl font-serif text-[#d4af37] my-4">&</div>

            <h1 class="text-4xl md:text-5xl font-playfair italic text-[#2d4537] mt-2">Fidha Meharin. K</h1>
            <p class="text-sm text-gray-500 mb-8 uppercase">D/O Abdul Azeez & Mymoonath</p>

            <div class="border-t border-b border-[#d4af37] py-6 my-8 bg-[#fdfaf0]">
                <p class="text-lg font-semibold">SUNDAY</p>
                <p class="text-4xl font-bold text-[#2d4537] my-2">31 MAY 2026</p>
                <p class="text-lg">AT 11:00 AM</p>
            </div>

            <div class="mt-8 p-6 bg-[#f0f2ef] rounded shadow-inner">
                <h3 class="text-xl font-bold uppercase tracking-wider mb-2">Venue</h3>
                <p>BRIDE’S HOME</p>
                <p class="font-semibold text-lg">PALLIKKUNNU AUDITORIUM</p>
            </div>
        </div>

        <!-- Decorative Floral -->
        <div
            class="absolute bottom-0 left-0 w-24 h-24 bg-gradient-to-tr from-[#2d4537] to-transparent opacity-10 rounded-full floating">
        </div>
    </div>

</body>

</html>
